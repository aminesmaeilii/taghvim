services:
  - type: web
    name: taghvim-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm --workspace backend run build
    startCommand: npm --workspace backend run start
    healthCheckPath: /health/ready
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: FRONTEND_URL
        value: https://taghvim.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://taghvim.vercel.app,http://localhost:1420,http://localhost:5173,http://127.0.0.1:1420,http://127.0.0.1:5173
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: CRON_SECRET
        generateValue: true
